name: govulncheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule: # daily at 03:33 UTC
    - cron: '33 03 * * *'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  govulncheck:
    name: Check Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -show verbose,color ./...
